<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web To-Do List</title>
    <link rel="stylesheet" href="src/css/output.css" />
  </head>
  <body class="font-primary bg-white dark:bg-slate-900 transition-colors duration-500">
    <!-- Navbar Start -->
    <nav class="sticky border-b-2 border-gray-300 dark:border-gray-700">
      <div class="container mx-auto px-4 py-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Todo <span class="text-blue-800">List</span></h1>
        <button id="btn-theme">
          <span class="block dark:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8 text-gray-600 hover:text-gray-400">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
              />
            </svg>
          </span>
          <span class="hidden dark:block">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8 text-gray-300 hover:text-gray-500">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
              />
            </svg>
          </span>
        </button>
      </div>
    </nav>
    <!-- Navbar End -->

    <!-- Main Content Start -->
    <section id="main" class="flex flex-col justify-center items-center my-8">
      <div class="container mx-auto px-4 py-10 text-center">
        <h1 class="capitalize text-xl md:text-2xl lg:text-3xl font-bold text-gray-800 dark:text-white mb-4">Apa yang ingin kamu kerjakan hari ini?</h1>
        <p class="text-sm md:text-base lg:text-lg text-gray-600 dark:text-gray-400">Tambahkan tugas baru dan mulai bekerja!</p>
      </div>

      <div class="w-full flex justify-center items-center gap-4 mb-8">
        <input
          type="text"
          id="todo-input"
          class="outline outline-gray-300 rounded-sm p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 w-1/2 md:w-1/3 text-lg md:text-xl dark:text-white dark:bg-slate-800 dark:outline-gray-600"
          placeholder="Masukkan tugas baru..."
        />
        <button id="btn-add-todo" class="bg-blue-500 hover:bg-blue-700 text-white font-normal p-4 rounded-sm text-base md:text-xl transition-colors">Tambah Tugas</button>
      </div>

      <div class="w-full flex flex-col justify-center items-center mt-4">
        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-8">
          <button data-filter="all" class="px-4 py-1.5 rounded-lg border border-gray-200 bg-blue-600 text-white transition-colors">All</button>
          <button data-filter="todo" class="px-4 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-600 transition-colors">Todo</button>
          <button data-filter="done" class="px-4 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-600 transition-colors">Done</button>
        </div>

        <!-- Todo List Container -->
        <div id="todo-container" class="w-2/3 shadow-sm border border-gray-300 dark:border-gray-500 rounded-xl overflow-hidden">
        <!-- Item akan di-render di sini oleh JavaScript -->
        </div>

        <!-- Stats -->
        <p id="todo-stats" class="mt-6 text-gray-500 text-sm"></p>
      </div>
    </section>
    <!-- Main Content End -->

    <script src="src/js/script.js"></script>
  </body>
</html>
